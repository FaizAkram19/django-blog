
<form action="{% url 'polls:vote' question.id %}" method="post">
    <!--Using method="post" (as opposed to method="get") is very important, 
    because the act of submitting this form will alter data server-side.-->
    {% csrf_token %}
    <fieldset>
        <legend><h1>{{ question.question_text }}</h1></legend>
        {% if error_message %}<p><strong>
            {{ error_message }}
        <!--This block checks if the server sent back an error_message variable.-->
        <!--If it exists, it displays the message in bold-->
        </strong></p>
        {% endif %}
        {% for choice in question.choice_set.all %}
            <input type="radio" name="choice" id="choice{{ forloop.counter }}" value="{{ choice.id }}">
            <label for="choice{{ forloop.counter }}">{{ choice.choice_text }}</label>
            <!--The name of each radio button is "choice". That means, when somebody selects one of
            the radio buttons and submits the form,
            it’ll send the POST data choice=# where # is the ID of the selected choice.
            -->
            <br>
        {% endfor %}
    </fieldset>
    <input type="submit" value="Vote">
</form>
